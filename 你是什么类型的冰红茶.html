<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>冰红茶人格测试 | 你是什么类型的冰红茶</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #e67e22 0%, #f39c12 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
        }

        .card {
            max-width: 650px;
            margin: 0 auto;
            background: #fffef7;
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            overflow: hidden;
            position: relative;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 12px;
            background: linear-gradient(90deg, #c0392b, #e67e22, #f1c40f, #2ecc71);
        }

        .inner {
            padding: 30px 28px 40px;
        }

        h1 {
            font-size: 28px;
            text-align: center;
            color: #b45f1b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .badge {
            text-align: center;
            color: #e67e22;
            background: #fef3e2;
            display: inline-block;
            width: auto;
            margin: 0 auto 20px;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
        }

        .question-area {
            margin: 20px 0 15px;
        }

        .q-num {
            background: #e67e22;
            color: white;
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .q-text {
            font-size: 20px;
            font-weight: 600;
            color: #2c3e2f;
            line-height: 1.4;
            margin-bottom: 25px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 35px;
        }

        .opt-btn {
            background: #fef5e8;
            border: 1.5px solid #f7d9a4;
            border-radius: 100px;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 500;
            color: #7e4a1a;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .opt-btn:hover {
            background: #ffe6bf;
            transform: scale(0.98);
            border-color: #e67e22;
        }

        .opt-letter {
            background: #e67e22;
            color: white;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            font-weight: bold;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        .nav-btn {
            background: #e67e22;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .nav-btn:active {
            transform: scale(0.96);
        }

        .nav-btn.secondary {
            background: #e0c8a8;
            color: #7e4a1a;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress {
            background: #f0e1c0;
            border-radius: 20px;
            height: 8px;
            width: 100%;
            margin: 15px 0 25px;
        }

        .progress-bar {
            background: #e67e22;
            width: 0%;
            height: 8px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .result-box {
            text-align: center;
        }

        .result-img {
            width: 140px;
            height: 140px;
            margin: 10px auto 20px;
            background: #f9e2b7;
            border-radius: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .result-name {
            font-size: 36px;
            font-weight: 800;
            color: #c0392b;
            margin-bottom: 16px;
        }

        .result-desc {
            font-size: 18px;
            line-height: 1.5;
            color: #2c3e2f;
            background: #fffbee;
            padding: 20px;
            border-radius: 36px;
            margin: 20px 0;
        }

        .restart-btn {
            background: #e67e22;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 17px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin-top: 15px;
        }

        footer {
            text-align: center;
            font-size: 12px;
            color: #ccaa7b;
            margin-top: 30px;
        }
    </style>
<script defer="defer" src="%E4%BD%A0%E6%98%AF%E4%BB%80%E4%B9%88%E7%B1%BB%E5%9E%8B%E7%9A%84%E5%86%B0%E7%BA%A2%E8%8C%B6_files/unified.js" data-set=""></script></head>
<body>
<div class="card">
    <div class="inner" id="app">
            <div style="text-align:center"><span class="badge">🍋 冰红茶人格 · 第1/15题</span></div>
            <div class="progress"><div class="progress-bar" style="width: 0%;"></div></div>
            <div class="question-area">
                <div class="q-text">周末早上醒来，你第一反应是？</div>
                <div class="options" id="optionsContainer">
                    
                <div class="opt-btn" data-opt="0" style="">
                    <span class="opt-letter">A</span>
                    <span>赖床捏捏手机</span>
                </div>
            
                <div class="opt-btn" data-opt="1" style="">
                    <span class="opt-letter">B</span>
                    <span>继续睡，累死</span>
                </div>
            
                <div class="opt-btn" data-opt="2" style="">
                    <span class="opt-letter">C</span>
                    <span>立刻找好笑视频刷</span>
                </div>
            
                <div class="opt-btn" data-opt="3" style="">
                    <span class="opt-letter">D</span>
                    <span>起床晨跑/干劲满满</span>
                </div>
            
                </div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn secondary" id="prevBtn" disabled="disabled">◀ 上一题</button>
                <button class="nav-btn" id="nextBtn" disabled="disabled">下一题 ▶</button>
            </div>
            <footer>选完15题自动出结果 ✨</footer>
        </div>
</div>

<script>
    // 定义四种结果类型
    const TYPES = {
        NNN: { name: "捏捏型冰红茶", desc: "秉承着不惹事也怕事的原则，你从不惹事，别人惹你，你的解决方式绝对不是粗暴的，你就像一个捏捏，虽然会被人揉捏但软软的也很可爱。", emoji: "🧸" },
        HZ: { name: "魂珠型冰红茶", desc: "工作已经把你吸成了一颗色泽圆润的魂珠！工作结束累累的，只想大睡一场。", emoji: "💤" },
        MW: { name: "魔丸型冰红茶", desc: "魔丸降世，乐于观看一切能让你大笑的人和事。", emoji: "😈🔥" },
        JOJO: { name: "JOJO型冰红茶", desc: "你像jojo一样热血，坚持自己心里的道理，平日里也经常精力十足。", emoji: "💪✨" }
    };

    // ----- 15道题目 -----
    const QUESTIONS = [
        { text: "周末早上醒来，你第一反应是？", options: ["赖床捏捏手机", "继续睡，累死", "立刻找好笑视频刷", "起床晨跑/干劲满满"] },
        { text: "朋友突然给你介绍新的人认识，你会？", options: ["躲在熟人背后微笑", "礼貌回应然后想回家", "主动聊爆笑话题", "热情握手交谈，气氛担当"] },
        { text: "遇到冲突的时候，你更像？", options: ["软软退一步", "表面没事内心破碎", "看热闹不嫌事大", "正面辩论坚持道理"] },
        { text: "最能形容你职场/校园状态的是？", options: ["低调小透明", "被榨干魂珠", "摸鱼欢乐喜剧人", "热血行动派"] },
        { text: "收到很委屈的评价，你会？", options: ["偷偷难过不反驳", "自闭疲惫感上升", "转头和朋友吐槽笑骂", "当场讲清楚事实"] },
        { text: "哪种活动让你充电？", options: ["独处捏捏乐", "睡觉休息", "看搞笑综艺", "运动/竞技/战斗番"] },
        { text: "朋友评价你的性格更像是？", options: ["软萌捏捏", "易累体质", "开心果/调皮鬼", "正直小太阳"] },
        { text: "面对压力最常出现的反应？", options: ["忍耐不吭声", "疲惫想躺平", "用幽默化解", "硬刚或加倍努力"] },
        { text: "看到网上吵架，你的反应？", options: ["迅速滑走怕被波及", "看了更累划走", "当笑话截图给朋友", "激情打字理性辩论"] },
        { text: "哪种饮料广告词最像你？", options: ["温柔陪伴", "解乏充电", "就是要快乐", "热血沸腾"] },
        { text: "被人开玩笑调侃时，你会？", options: ["跟着笑笑但不反击", "无所谓只想躺着", "开更猛的玩笑回去", "笑着聊自己的原则"] },
        { text: "工作/作业ddl前夜状态？", options: ["焦虑但不说", "灵魂出窍赶工", "边玩边赶最后大笑", "高效率冲刺完成"] },
        { text: "最喜欢哪种自然景象？", options: ["安静的落叶", "夜晚星空暗淡", "彩虹/烟火热闹", "日出/烈火"] },
        { text: "变身超级英雄，你的能力更偏向？", options: ["保护罩/治愈", "吸收精力睡觉", "欢乐领域让人大笑", "硬核格斗/正义铁拳"] },
        { text: "如果是一瓶冰红茶，你希望标签上写？", options: ["柔软解压", "补血魂珠", "爆笑魔丸", "热血JOJO"] }
    ];

    const TYPE_KEYS = ["NNN", "HZ", "MW", "JOJO"];
    
    let currentIndex = 0;
    let answers = new Array(QUESTIONS.length).fill(null);
    
    function getScores() {
        let scores = { NNN: 0, HZ: 0, MW: 0, JOJO: 0 };
        for(let i = 0; i < answers.length; i++) {
            const ans = answers[i];
            if(ans !== null && ans >= 0 && ans < TYPE_KEYS.length) {
                const typeKey = TYPE_KEYS[ans];
                scores[typeKey]++;
            }
        }
        return scores;
    }
    
    function getResultType() {
        const scores = getScores();
        let maxType = "NNN";
        let maxScore = scores.NNN;
        if(scores.HZ > maxScore) { maxType = "HZ"; maxScore = scores.HZ; }
        if(scores.MW > maxScore) { maxType = "MW"; maxScore = scores.MW; }
        if(scores.JOJO > maxScore) { maxType = "JOJO"; maxScore = scores.JOJO; }
        return maxType;
    }
    
    function render() {
        const app = document.getElementById("app");
        
        // 如果所有题目都答完了，显示结果
        const allAnswered = answers.every(a => a !== null);
        if(allAnswered) {
            const resultType = getResultType();
            const result = TYPES[resultType];
            const imgHtml = `<div class="result-img">${result.emoji}</div>`;
            app.innerHTML = `
                <div class="result-box">
                    ${imgHtml}
                    <div class="result-name">🍹 ${result.name}</div>
                    <div class="result-desc">${result.desc}</div>
                    <button class="restart-btn" id="restartTest">🔄 重新测试</button>
                    <footer>冰红茶人格 · 仅供娱乐 ✨</footer>
                </div>
            `;
            document.getElementById("restartTest").addEventListener("click", () => {
                currentIndex = 0;
                answers = new Array(QUESTIONS.length).fill(null);
                render();
            });
            return;
        }
        
        // 否则显示当前题目
        const q = QUESTIONS[currentIndex];
        let optionsHtml = "";
        q.options.forEach((opt, idx) => {
            const letter = String.fromCharCode(65 + idx);
            const isSelected = (answers[currentIndex] === idx);
            const selectedStyle = isSelected ? 'background: #ffe0b5;' : '';
            optionsHtml += `
                <div class="opt-btn" data-opt="${idx}" style="${selectedStyle}">
                    <span class="opt-letter">${letter}</span>
                    <span>${opt}</span>
                </div>
            `;
        });
        
        const percent = ((currentIndex) / QUESTIONS.length) * 100;
        app.innerHTML = `
            <div style="text-align:center"><span class="badge">🍋 冰红茶人格 · 第${currentIndex+1}/${QUESTIONS.length}题</span></div>
            <div class="progress"><div class="progress-bar" style="width: ${percent}%;"></div></div>
            <div class="question-area">
                <div class="q-text">${q.text}</div>
                <div class="options" id="optionsContainer">
                    ${optionsHtml}
                </div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn secondary" id="prevBtn" ${currentIndex === 0 ? 'disabled' : ''}>◀ 上一题</button>
                <button class="nav-btn" id="nextBtn" ${answers[currentIndex] === null ? 'disabled' : ''}>下一题 ▶</button>
            </div>
            <footer>选完15题自动出结果 ✨</footer>
        `;
        
        // 绑定选项点击事件
        document.querySelectorAll(".opt-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const optVal = parseInt(btn.dataset.opt);
                answers[currentIndex] = optVal;
                // 重新渲染当前题目以更新选中样式
                render();
            });
        });
        
        // 上一题
        const prevBtn = document.getElementById("prevBtn");
        if(prevBtn) {
            prevBtn.addEventListener("click", () => {
                if(currentIndex > 0) {
                    currentIndex--;
                    render();
                }
            });
        }
        
        // 下一题
        const nextBtn = document.getElementById("nextBtn");
        if(nextBtn) {
            nextBtn.addEventListener("click", () => {
                if(answers[currentIndex] !== null) {
                    if(currentIndex + 1 < QUESTIONS.length) {
                        currentIndex++;
                        render();
                    } else {
                        // 已经是最后一题，点击后由于 allAnswered 会变成 true，重新渲染显示结果
                        render();
                    }
                }
            });
        }
    }
    
    render();
</script>

<div>
        <div id="edgeone-watermark" style="position: fixed; bottom: 0; left: 0; width: 100%; z-index: 9999; display: flex; justify-content: center; align-items: flex-end; padding: 50px 15px 15px 15px; box-sizing: border-box; background-image: linear-gradient(to top, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0)); pointer-events: none;">
          <div style="display: flex; align-items: center; pointer-events: auto;">
            <span style="font-size: 12px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; line-height: 1.5; color: rgba(255, 255, 255, 0.85); text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);">
              For demonstration and testing purposes only. Please do not enter any sensitive data.
            </span>
            <span id="edgeone-watermark-close" style="display: inline-block; width: 12px; height: 12px; margin-left: 8px; cursor: pointer; position: relative;">
              <svg viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: 100%; display: block;" aria-label="close">
                <line x1="2" y1="10" x2="10" y2="2" stroke="rgba(255, 255, 255, 0.85)" stroke-width="2" stroke-linecap="round"></line>
                <line x1="2" y1="2" x2="10" y2="10" stroke="rgba(255, 255, 255, 0.85)" stroke-width="2" stroke-linecap="round"></line>
              </svg>
            </span>
          </div>
        </div>
      </div></body></html>
